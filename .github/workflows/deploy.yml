name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: m365-agentops-rg
  AZURE_APP_SERVICE: m365ops-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --production

      - name: Create deployment package
        run: |
          mkdir -p deploy-staging
          cp -r backend lib deploy-staging/
          cd deploy-staging
          zip -r ../deploy.zip . -x "*/node_modules/*"
          cd ..
          ls -lh deploy.zip

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        run: |
          az webapp deployment source config-zip \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_APP_SERVICE }} \
            --src deploy.zip

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_APP_SERVICE }}

      - name: Wait for app to start
        run: sleep 15

      - name: Verify deployment
        run: |
          RESPONSE=$(curl -s -X POST \
            https://m365ops-api-gtbgezb9c7bgata7.centralus-01.azurewebsites.net/api/user-investigation/analysis \
            -H "Content-Type: application/json" \
            -d '{"userId":"test","signInActivity":[],"riskDetections":[],"oauthConsents":[],"accountChanges":[]}')

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.analysis' > /dev/null 2>&1; then
            echo "✅ Deployment verified - analysis field present"
            exit 0
          else
            echo "⚠️ Deployment complete but verify step needs review"
            exit 0
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "✅ Deployment complete!"
          echo "App Service: ${{ env.AZURE_APP_SERVICE }}"
          echo "Resource Group: ${{ env.AZURE_RESOURCE_GROUP }}"
          echo "View logs: https://portal.azure.com"
