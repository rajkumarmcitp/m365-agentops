name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd backend && npm ci --production

      - name: Create deployment package
        run: |
          mkdir deploy-pkg
          cp -r backend lib node_modules deploy-pkg/
          cd deploy-pkg
          zip -r ../app.zip . -q
          cd ..
          echo "Package size: $(ls -lh app.zip | awk '{print $5}')"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'm365ops-api'
          package: './app.zip'
          clean: true

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group m365-agentops-rg \
            --name m365ops-api

      - name: Wait for app startup
        run: sleep 20

      - name: Verify deployment
        run: |
          echo "Checking backend health..."
          curl -s -X POST https://m365ops-api-gtbgezb9c7bgata7.centralus-01.azurewebsites.net/api/user-investigation/analysis \
            -H "Content-Type: application/json" \
            -d '{"userId":"test","signInActivity":[],"riskDetections":[],"oauthConsents":[],"accountChanges":[]}' \
            | jq '.success, .error' || echo "⚠️ Health check incomplete but deployment should be successful"

      - name: Deployment complete
        run: echo "✅ Deployment to Azure App Service completed successfully!"
