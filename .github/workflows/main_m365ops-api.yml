# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - m365ops-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Create backend .env file
        run: |
          cat > backend/.env << 'EOF'
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_REDIRECT_URI=https://m365ops-api.azurewebsites.net/auth/callback
          SHAREPOINT_SITE_ID=${{ secrets.SHAREPOINT_SITE_ID }}
          NODE_ENV=production
          PORT=8080
          FRONTEND_URL=https://proud-river-0f55f1e10.7.azurestaticapps.net
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./node-app/backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1E22CF12AE6A4376AE2457FC1C8BC591 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0D00FD53FBA40CF9DA4CAB2D5AC316D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A8751B9CC85F45DDB0CB43AF2503BADD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'm365ops-api'
          slot-name: 'Production'
          package: node-app
          